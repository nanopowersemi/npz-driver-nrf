name: Release with submodules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false 
          
      - name: URL and Update Submodules to HEAD
        run: |
          # 1. Limpa qualquer inicialização ou cache corrompida do submódulo
          git submodule deinit -f . || true
          
          # 2. Força a alteração do URL no ficheiro .gitmodules usando o Git (evita erros de sed)
          git config --file .gitmodules submodule.nPZero_driver.url "https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com"
          
          # 3. Sincroniza a configuração com o Git interno
          git submodule sync
          
          # 4. Inicializa e atualiza o submódulo a partir do novo URL HTTPS autenticado
          git submodule update --init --recursive --remote --force
          
      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-xc32-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          append_body: true
          # Generates the changelog automatically
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
