name: Release with submodules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 1. Inicializa o ambiente Python necessário para as ferramentas do Zephyr (West)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      # 2. Instala o West (gestor de repositórios do Zephyr)
      - name: Install West
        run: |
          pip install west

          # Remove qualquer configuração global do Git que o Runner tente injetar de forma errada
          git config --global --unset-all url."https://github.com/".insteadOf || true

      # 3. Faz o checkout do repositório principal sem tocar nos submódulos do Git
      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false # IMPEDE o bug do git submodule update

      # 4. Usa o West para descarregar o nPZero_driver e os componentes do Zephyr de forma correta
      - name: Fetch Dependencies via West
        run: |
          # Inicializa o workspace do Zephyr baseado no repositório atual
          west init -l . || west init .
          
          # Descarrega os módulos necessários de forma limpa, contornando o interpretador do Git
          west update


      - name: Create ZIP file
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="manual-build"
          fi

          ZIP_NAME="npz-driver-nrf-${TAG_NAME}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          append_body: true
          generate_release_notes: true 
          tag_name: ${{ github.event.release.tag_name }}
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
