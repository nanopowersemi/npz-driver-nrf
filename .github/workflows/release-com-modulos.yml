name: Release with submodules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false 

      - name: URL and Update Submodules to HEAD
        run: |
          # 1. Substituição exata e limpa do URL do Gitea para o repositório público do GitHub
          sed -i 's|git@gitea.nano.power:NP0_G0_EVB/nPZero_driver.git|https://github.com/nanopowersemi/npz-driver.git|g' .gitmodules
          
          # 2. Sincroniza a árvore do Git com o novo ficheiro modificado
          git submodule sync
          
          # 3. Executa o update com sucesso através do URL corrigido
          git submodule update --init --recursive --remote --force

      - name: Create ZIP file
        run: |
          # Define um nome padrão (fallback) caso o workflow seja disparado manualmente (workflow_dispatch)
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="manual-build"
          fi

          ZIP_NAME="npz-driver-nrf-${TAG_NAME}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          append_body: true
          generate_release_notes: true 
          # Garante que se for disparado manualmente, tenta associar à última tag conhecida ou falha graciosamente sem quebrar o runner
          tag_name: ${{ github.event.release.tag_name }}
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
