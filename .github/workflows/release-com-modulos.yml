name: Release with submodules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base only)
        uses: actions/checkout@v4
        with:
          # REMOVIDO o token daqui para impedir que o GitHub corrompa o ambiente Git
          submodules: false 
          persist-credentials: false

      - name: Download Submodule Content Safely via API
        run: |
          # 1. Remove qualquer pasta antiga ou vestígio do submódulo para evitar conflitos
          rm -rf nPZero_driver
          
          # 2. Transfere o código da branch principal do submódulo como um ficheiro ZIP limpo
          # Usamos o token do App diretamente no cabeçalho HTTP da API do GitHub
          curl -L -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
               -o submodule.zip \
               https://github.com
          
          # 3. Cria a pasta destino e extrai apenas os ficheiros de código lá dentro
          mkdir nPZero_driver
          unzip submodule.zip -d nPZero_driver
          
          # 4. Ajusta a estrutura (a API do GitHub extrai os ficheiros dentro de uma subpasta com o hash do commit)
          mv nPZero_driver/*/* nPZero_driver/ 2>/dev/null || true
          
          # 5. Limpa os ficheiros temporários do processo
          rm -f submodule.zip

      - name: Create ZIP file
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="manual-build"
          fi

          ZIP_NAME="npz-driver-nrf-${TAG_NAME}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          append_body: true
          generate_release_notes: true 
          tag_name: ${{ github.event.release.tag_name }}
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
