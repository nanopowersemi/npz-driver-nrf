name: Release with submodules

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base only)
        uses: actions/checkout@v4
        with:
          # REMOVA o token do App daqui para impedir que o GitHub aplique o insteadOf corrompido
          submodules: false 
          persist-credentials: false

      - name: Force Clean Clone of Submodule
        run: |
          # 1. Garante que pastas antigas e caches falhadas são eliminadas do Runner
          rm -rf nPZero_driver
          rm -rf .git/modules/nPZero_driver
          
          # 2. Faz o clone HTTPS direto usando o Token do App, sem acionar o motor de submódulos do Git
          git clone --depth 1 "https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com" nPZero_driver
          
          # 3. Remove os metadados do Git do submódulo para que os ficheiros fiquem limpos para o ZIP
          rm -rf nPZero_driver/.git
              
      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
