name: Release with submodules

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # O actions/checkout já configura a autenticação e converte URLs SSH para HTTPS automaticamente se usar o token do App
      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false # Mantemos desativado para evitar o bug do runner
          
      - name: Fetch Submodules via Native Git Command
        run: |
          # 1. Limpa qualquer configuração local que possa conter o insteadOf corrompido
          git config --local --unset-all url."https://github.com".insteadOf || true
          git config --local --unset-all url."git@github.com:".insteadOf || true
          
          # 2. Constrói o URL HTTPS completo e autenticado com o token do GitHub App
          AUTH_URL="https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com"
          
          # 3. Altera o URL do submódulo diretamente na configuração local
          git submodule set-url nPZero_driver "$AUTH_URL"
          git submodule sync --recursive
          
          # 4. Apaga metadados antigos do submódulo para forçar o Git a ler o novo URL limpo
          rm -rf .git/modules/nPZero_driver
          rm -rf nPZero_driver
          
          # 5. Executa o clone isolando o ambiente de qualquer configuração do runner
          GIT_CONFIG_GLOBAL=/dev/null GIT_CONFIG_SYSTEM=/dev/null git submodule update --init --recursive --force

              
      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
