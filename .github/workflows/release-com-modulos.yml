name: Release with submodules

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base only)
        uses: actions/checkout@v4
        with:
          submodules: false # Garante que a action não mexe em submódulos
          persist-credentials: false

      - name: Nuclear Clean and Clone Submodule Manually
        run: |
          # 1. Destrói qualquer configuração global do Git que o Runner tenha injetado
          git config --global --unset-all url."https://github.com".insteadOf || true
          git config --global --unset-all url."git@github.com:".insteadOf || true
          git config --system --unset-all url."https://github.com".insteadOf || true 2>/dev/null
          
          # 2. Limpa pastas antigas e caches locais falhadas
          rm -rf nPZero_driver
          rm -rf .git/modules/nPZero_driver
          
          # 3. Faz o clone manual isolado, forçando o Git a ignorar reescritas de URL no subprocesso
          git -c url."https://github.com".insteadOf="" \
              clone --depth 1 "https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com" nPZero_driver
          
          # 4. Remove os metadados do Git do submódulo para não quebrar o passo do ZIP
          rm -rf nPZero_driver/.git
              
      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
