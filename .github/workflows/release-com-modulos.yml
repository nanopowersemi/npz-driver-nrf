name: Release with submodules

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # O actions/checkout já configura a autenticação e converte URLs SSH para HTTPS automaticamente se usar o token do App
      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false # Mantemos desativado para evitar o bug do runner
          
      - name: Fetch Submodules via Native Git Command
        run: |
          # 1. Atualiza explicitamente o URL do submódulo na árvore do repositório principal
          git submodule set-url nPZero_driver "https://github.com/nanopowersemi/npz-driver"
          git submodule sync --recursive

          # 2. Executa o clone corrigindo a sintaxe do cabeçalho e anulando regras globais corrompidas
          git -c url."https://github.com/".insteadOf="" \
              -c http.https://github.com"AUTHORIZATION: basic $(echo -n "x-access-token:${{ steps.generate_token.outputs.token }}" | base64)" \
              submodule update --init --recursive --force
              
      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
