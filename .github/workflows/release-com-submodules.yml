name: Release with submodules

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false 

      - name: Fetch Submodules via HTTPS Token
        run: |
          # 1. Inicializa o mapeamento básico do submódulo
          git submodule init
          
          # 2. Altera dinamicamente a rota SSH para HTTPS injetando o token da GitHub App
          git submodule set-url nPZero_driver "https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com"
          
          # 3. Força a atualização para o HEAD remoto com segurança
          git submodule update --init --recursive --remote --force

      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
