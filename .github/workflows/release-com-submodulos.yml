name: Release with submodules

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Token to GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository (base)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          submodules: false 

      - name: URL and Update Submodules to HEAD
        run: |
          # 1. Configurar o Git para usar o token gerado em todos os pedidos ao GitHub
          git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@://github.com".insteadOf "https://://github.com"

          # 2. Corrigir o URL do ficheiro .gitmodules para o caminho completo
          sed -i 's|git@gitea.nano.power:NP0_G0_EVB/nPZero_driver.git|https://://github.comnanopowersemi/npz-driver|g' .gitmodules
          
          # 3. Sincronizar o novo URL no Git interno
          git submodule sync
          
          # 4. Forçar a atualização para a última versão do submódulo
          git submodule update --init --recursive --remote --force

      - name: Create ZIP file
        run: |
          ZIP_NAME="npz-driver-nrf-${{ github.event.release.tag_name || 'manual' }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github/*"

          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILENAME }}
          append_body: true
          generate_release_notes: true 
          body: |
            
            ---
            ### 📦 Submodules Included
            > [!IMPORTANT]
            > Please use the **`${{ env.ZIP_FILENAME }}`** asset attached below for the complete project.
            > The default "Source code" zips provided by GitHub **do not** include submodule content.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
